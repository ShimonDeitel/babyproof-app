name: BabyproofChecklist
options:
  bundleIdPrefix: com.shimondeitel.babyproof
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BabyproofChecklist:
    type: application
    platform: iOS
    sources:
      - path: BabyproofChecklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babyproof
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BabyproofChecklist/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BabyproofChecklistTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BabyproofChecklistTests
      - path: BabyproofChecklist.storekit
    dependencies:
      - target: BabyproofChecklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babyproof.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BabyproofChecklistUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BabyproofChecklistUITests
    dependencies:
      - target: BabyproofChecklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babyproof.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BabyproofChecklist:
    build:
      targets:
        BabyproofChecklist: all
        BabyproofChecklistTests: [test]
        BabyproofChecklistUITests: [test]
    test:
      targets:
        - BabyproofChecklistTests
        - BabyproofChecklistUITests
